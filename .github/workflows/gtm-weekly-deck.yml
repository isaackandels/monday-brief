name: Weekly GTM Deck

# cron-job.org calls this every Friday via the GitHub API (workflow_dispatch).
# The script itself only sends on the LAST Friday of the month, so you do not
# need to change the cron-job.org schedule. Other Fridays exit quietly.
#
# Manual runs: tick "force" to send regardless of the date (for testing).
on:
  workflow_dispatch:
    inputs:
      force:
        description: "Send even if today is not the last Friday of the month"
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests python-pptx python-dotenv
      - name: Build and send monthly GTM deck
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FORCE_SEND: ${{ github.event.inputs.force }}
        run: python gtm_weekly_deck_email.py
