name: Weekly Pipeline Brief

# Triggered externally on a weekly cadence via the workflow_dispatch API.
on:
  workflow_dispatch: {}

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run brief
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEF_FROM_EMAIL: ${{ secrets.BRIEF_FROM_EMAIL }}
          BRIEF_TO_EMAIL: ${{ secrets.BRIEF_TO_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python runner.py

      - name: Upload HTML artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pipeline-brief-html
          path: |
            dsn-pipeline-brief-live.html
            dsn-pipeline-brief-email.html
          if-no-files-found: ignore
